<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>セトリアプリ</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<h1>セトリアプリ🎀</h1>

<div class="box">
  <input type="file" id="imageInput" accept="image/*">
  <button id="loadImageBtn">画像から読み込む</button>
</div>

<hr>

<h2>メンバー</h2>
<input type="text" id="memberInput" placeholder="名前">
<button onclick="addMember()">追加</button>
<div id="memberList"></div>

<h2>曲</h2>
<input type="text" id="songInput" placeholder="曲名">
<button onclick="addSong()">追加</button>
<div id="songList"></div>

<script src="script.js"></script>
</body>
</html>
